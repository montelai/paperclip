events {
    worker_connections 1024;
}

http {
    upstream paperclip {
        server paperclip:3100;
    }

    upstream plane {
        server plane-web:3000;
    }

    server {
        listen 80;
        server_name _;

        # Paperclip
        location /paperclip/ {
            rewrite ^/paperclip/(.*) /$1 break;
            proxy_pass http://paperclip;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Paperclip API
        location /paperclip/api/ {
            rewrite ^/paperclip/api/(.*) /api/$1 break;
            proxy_pass http://paperclip;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plane
        location / {
            proxy_pass http://plane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server (uncomment when SSL is configured)
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;

# Paperclip with Task Backend Integration
# Connects to external Plane instance (e.g., plane.so cloud)

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - paperclip-network

  paperclip:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-dev-secret-change-in-production}"
      # Task Backend - defaults to paperclip
      TASK_BACKEND_TYPE: "${TASK_BACKEND_TYPE:-paperclip}"
      # Plane Integration (when TASK_BACKEND_TYPE=plane)
      PLANE_API_URL: "${PLANE_API_URL:-https://api.plane.so}"
      PLANE_API_KEY: "${PLANE_API_KEY:-}"
      PLANE_WORKSPACE_SLUG: "${PLANE_WORKSPACE_SLUG:-}"
      PLANE_DEFAULT_PROJECT_ID: "${PLANE_DEFAULT_PROJECT_ID:-}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paperclip-network
    restart: unless-stopped

volumes:
  pgdata:
  paperclip-data:

networks:
  paperclip-network:
    driver: bridge
